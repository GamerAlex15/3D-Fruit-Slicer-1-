<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Fruit Slicer</title>
    
    <!-- These links connect to your existing manifest.json -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://placehold.co/192x192/ff4e50/white?text=S3D">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background-color: #0a0a0a; user-select: none; touch-action: none; }
        canvas { display: block; }
        .gradient-text { background: linear-gradient(45deg, #ff4e50, #f9d423); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .ui-panel { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>

<div id="ui-layer" class="fixed inset-0 pointer-events-none z-10 flex flex-col justify-between p-6">
    <div class="flex justify-between items-start pointer-events-auto">
        <div class="ui-panel p-4 rounded-2xl shadow-2xl">
            <p class="text-white/60 text-xs uppercase tracking-widest font-bold">Score</p>
            <p id="score-val" class="text-4xl text-white font-black">000</p>
        </div>
        <div class="ui-panel p-4 rounded-2xl shadow-2xl flex gap-2" id="lives-container">
            <div class="w-6 h-6 rounded-full bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.8)]"></div>
            <div class="w-6 h-6 rounded-full bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.8)]"></div>
            <div class="w-6 h-6 rounded-full bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.8)]"></div>
        </div>
    </div>
</div>

<div id="menu-overlay" class="fixed inset-0 z-20 flex items-center justify-center bg-black/80 backdrop-blur-sm transition-opacity duration-500">
    <div class="text-center p-8 max-w-md">
        <h1 class="text-6xl font-black mb-4 gradient-text italic tracking-tighter">SLICE 3D</h1>
        <p class="text-white/80 mb-8 leading-relaxed font-medium">Swipe to slice the flying fruits. Avoid the black spiked bombs. Don't let the fruit fall!</p>
        <button id="start-btn" class="bg-white text-black hover:bg-red-500 hover:text-white transition-all duration-300 px-12 py-4 rounded-full font-black text-xl shadow-xl active:scale-95 pointer-events-auto">
            START SLICING
        </button>
    </div>
</div>

<div id="game-over-overlay" class="fixed inset-0 z-30 hidden flex items-center justify-center bg-red-900/40 backdrop-blur-md">
    <div class="text-center p-10 bg-black/90 rounded-3xl border border-white/20 shadow-2xl">
        <h2 class="text-5xl font-black text-white mb-2">GAME OVER</h2>
        <p id="final-score" class="text-2xl text-red-400 mb-8 font-bold italic">Final Score: 0</p>
        <button onclick="location.reload()" class="bg-white text-black hover:bg-white/80 transition-all px-12 py-4 rounded-full font-black text-lg">
            TRY AGAIN
        </button>
    </div>
</div>

<script>
    let scene, camera, renderer, clock;
    let fruits = [];
    let particles = [];
    let score = 0;
    let lives = 3;
    let gameActive = false;
    let spawnTimer = 0;
    let mouse = new THREE.Vector2();
    let isSlicing = false;
    
    const synth = new Tone.PolySynth(Tone.Synth).toDestination();
    const noiseSynth = new Tone.NoiseSynth({ volume: -15 }).toDestination();

    const playSliceSound = () => { try { synth.triggerAttackRelease("E5", "16n"); } catch(e) {} };
    const playExplosionSound = () => { try { noiseSynth.triggerAttackRelease("8n"); } catch(e) {} };
    const playMissSound = () => { try { synth.triggerAttackRelease("G2", "8n"); } catch(e) {} };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 5, 35);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 12);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.2);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        window.addEventListener('resize', onWindowResize, false);
        window.addEventListener('mousemove', onInputMove, false);
        window.addEventListener('touchmove', (e) => onInputMove(e.touches[0]), { passive: false });
        
        window.addEventListener('mousedown', () => { isSlicing = true; Tone.start(); });
        window.addEventListener('touchstart', () => { isSlicing = true; Tone.start(); });
        window.addEventListener('mouseup', () => { isSlicing = false; });
        window.addEventListener('touchend', () => { isSlicing = false; });

        document.getElementById('start-btn').addEventListener('click', () => {
            gameActive = true;
            document.getElementById('menu-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('menu-overlay').classList.add('hidden'), 500);
        });

        animate();
    }

    const fruitMaterials = [
        new THREE.MeshStandardMaterial({ color: 0xff4e50, emissive: 0x330000, roughness: 0.2 }), 
        new THREE.MeshStandardMaterial({ color: 0xf9d423, emissive: 0x333300, roughness: 0.2 }), 
        new THREE.MeshStandardMaterial({ color: 0x86efac, emissive: 0x003300, roughness: 0.2 }), 
        new THREE.MeshStandardMaterial({ color: 0x60a5fa, emissive: 0x000033, roughness: 0.2 }), 
    ];

    const bombMaterial = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 1, roughness: 0.1, emissive: 0x110000 });

    function spawnFruit() {
        const isBomb = Math.random() < 0.2;
        const geometry = isBomb ? new THREE.IcosahedronGeometry(0.6, 0) : new THREE.SphereGeometry(0.7, 32, 32);
        const material = isBomb ? bombMaterial : fruitMaterials[Math.floor(Math.random() * fruitMaterials.length)];
        
        const fruit = new THREE.Mesh(geometry, material);
        fruit.position.set((Math.random() - 0.5) * 14, -8, (Math.random() - 0.5) * 4);
        fruit.userData = {
            velocity: new THREE.Vector3((Math.random() - 0.5) * 6, 16 + Math.random() * 5, (Math.random() - 0.5) * 2),
            rotationSpeed: new THREE.Vector3(Math.random() * 0.05, Math.random() * 0.05, Math.random() * 0.05),
            isBomb: isBomb,
            isSliced: false
        };
        scene.add(fruit);
        fruits.push(fruit);
    }

    function checkSlicing() {
        if (!isSlicing) return;
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(fruits);

        intersects.forEach(intersect => {
            const obj = intersect.object;
            if (obj.userData.isSliced) return;

            if (obj.userData.isBomb) {
                triggerGameOver();
                playExplosionSound();
            } else {
                sliceFruit(obj);
                playSliceSound();
                score += 10;
                document.getElementById('score-val').innerText = score.toString().padStart(3, '0');
            }
        });
    }

    function sliceFruit(fruit) {
        fruit.userData.isSliced = true;
        scene.remove(fruit);
        for (let i = 0; i < 2; i++) {
            const halfGeo = new THREE.SphereGeometry(0.7, 16, 16, i === 0 ? 0 : Math.PI);
            const half = new THREE.Mesh(halfGeo, fruit.material);
            half.position.copy(fruit.position);
            half.userData = {
                velocity: fruit.userData.velocity.clone().add(new THREE.Vector3(i === 0 ? -4 : 4, 3, 0)),
                rotationSpeed: fruit.userData.rotationSpeed.clone().multiplyScalar(5),
                life: 1.5
            };
            scene.add(half);
            particles.push(half);
        }
    }

    function triggerGameOver() {
        gameActive = false;
        document.getElementById('game-over-overlay').classList.remove('hidden');
        document.getElementById('final-score').innerText = `Final Score: ${score}`;
    }

    function onInputMove(event) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = Math.min(new THREE.Clock().getDelta(), 0.1);

        if (gameActive) {
            spawnTimer += 0.016; 
            if (spawnTimer > Math.max(0.3, 1.2 - (score / 1000))) {
                spawnFruit();
                spawnTimer = 0;
            }

            checkSlicing();

            fruits.forEach((f, index) => {
                f.position.add(f.userData.velocity.clone().multiplyScalar(0.016));
                f.userData.velocity.y -= 25 * 0.016;
                f.rotation.x += f.userData.rotationSpeed.x;
                if (f.position.y < -12) {
                    if (!f.userData.isSliced && !f.userData.isBomb) {
                        lives--;
                        if (document.getElementById('lives-container').children.length > 0) {
                            document.getElementById('lives-container').removeChild(document.getElementById('lives-container').lastElementChild);
                        }
                        playMissSound();
                        if (lives <= 0) triggerGameOver();
                    }
                    scene.remove(f);
                    fruits.splice(index, 1);
                }
            });

            particles.forEach((p, index) => {
                p.position.add(p.userData.velocity.clone().multiplyScalar(0.016));
                p.userData.velocity.y -= 25 * 0.016;
                p.userData.life -= 0.016;
                if (p.userData.life <= 0) {
                    scene.remove(p);
                    particles.splice(index, 1);
                }
            });
        }
        renderer.render(scene, camera);
    }

    window.onload = () => {
        init();
        // This registers your existing sw.js file
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => {
                console.log("Service Worker registration info:", err);
            });
        }
    };
</script>

</body>
</html>
